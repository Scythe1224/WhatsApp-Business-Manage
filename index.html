<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Business Manage</title>
  <style>
    :root {
      --brand: #25d366;
      --brand-dark: #128c7e;
      --brand-deep: #0b6b52;
      --brand-soft: #dcfce7;
      --ink: #102032;
      --muted: #5c7285;
      --line: #dce7e1;
      --panel: #ffffff;
      --shadow: 0 24px 60px rgba(16, 32, 50, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(37, 211, 102, 0.08), transparent 24%),
        linear-gradient(135deg, #f8fffb, #edf7f1 55%, #eaf8ee);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .login-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
    }

    .login-visual {
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .visual-card {
      width: min(980px, 100%);
      min-height: calc(100vh - 64px);
      border-radius: 34px;
      overflow: hidden;
      border: 1px solid rgba(220, 231, 225, 0.94);
      box-shadow: var(--shadow);
      background: linear-gradient(120deg, #fbfffd 0 44%, #1faf57 44% 100%);
      display: grid;
      grid-template-columns: 0.38fr 1.62fr;
      position: relative;
    }

    .visual-left {
      padding: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.72));
      backdrop-filter: blur(8px);
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      z-index: 2;
    }

    .badge {
      width: fit-content;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #cfe8d6;
      color: var(--brand-deep);
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 800;
    }

    .badge svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .visual-right {
      position: relative;
      padding: 0;
      min-height: 100%;
    }

    .visual-right::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(7, 94, 84, 0.06), rgba(37, 211, 102, 0.08)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.1));
      z-index: 1;
    }
